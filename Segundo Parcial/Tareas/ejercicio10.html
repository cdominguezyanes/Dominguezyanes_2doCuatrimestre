<body>
    <h1>Ejercicio10: Crea un formulario que pida el nombre del empleado, su salario por hora y las horas trabajadas en la semana. Al enviar el formulario, muestra los resultados del cálculo del salario.</h1>
    <form action="ejercicio10.php" method="get">
        <label>Ingrese el nombre del empleado: </label>
        <input type="text" name="nombre"><br><br>
        <label>Ingrese el salario por hora: </label>
        <input type="number" step="0.01" name="salario"><br><br>
        <label>Ingrese las horas trabajadas en la semana: </label>
        <input type="number" step="0.01" name="horas"><br><br>
        <button>Enviar</button>
    </form>
</body>
