<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>
    <h1>Ejercicio3: Crea un formulario que pida el nombre de un artículo, su precio original y el porcentaje de descuento. Al enviar el formulario, muestra el monto del descuento, el precio final con descuento aplicado y la categoría del descuento.</h1>
    <form action="ejercicio3.php" method="get">
        <label>Ingrese el nombre del artículo: </label>
        <input type="text" name="nombre"><br><br>
        <label>Ingrese el precio original: </label>
        <input type="number" name="precio" step="0.01"><br><br>
        <label>Ingrese el porcentaje de descuento: </label>
        <input type="number" name="descuento" step="0.01"><br><br>
        <button>Enviar</button>
    </form>
</body>
