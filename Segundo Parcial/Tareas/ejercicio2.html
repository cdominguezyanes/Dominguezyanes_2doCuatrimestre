<body>
    <h1>Ejercicio2: Crea un formulario que solicite el nombre de un producto y su precio sin IVA. Al enviar el formulario, se deberá calcular el IVA y mostrar lo siguiente: el monto del IVA (16%), el precio total con IVA incluido.</h1>
    <form action="ejercicio2.php" method="get">
        <label>Ingrese el nombre del producto: </label>
        <input type="text" name="nombre"><br><br>
        <label>Ingrese el precio sin IVA: </label>
        <input type="number" step="0.01" name="precio"><br><br>
        <button>Enviar</button>
    </form>
</body>
